# General idle behavior
general {
    lock_cmd = pidof hyprlock || hyprlock       # Start hyprlock if not already running
    before_sleep_cmd = loginctl lock-session    # Lock before sleep
    after_sleep_cmd = hyprctl dispatch dpms on  # Turn display back on after wake
}

# Dim screen after 2.5 minutes
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10        # Save current brightness, set to 10%
    on-resume = brightnessctl -r                # Restore saved brightness
}

# Lock session after 5 minutes
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn off display after 5.5 minutes
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes (only when on battery)
listener {
    timeout = 1800
    on-timeout = [ "$(cat /sys/class/power_supply/AC*/online 2>/dev/null || echo 0)" = "0" ] && systemctl suspend
}

