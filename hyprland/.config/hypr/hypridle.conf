# Custom hypridle configuration
# - No screensaver
# - Dim after 5 minutes
# - Lock after 10 minutes

general {
    lock_cmd = omarchy-lock-screen                         # lock screen and 1password
    before_sleep_cmd = loginctl lock-session               # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on             # avoid pressing key twice to turn on display
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Dim screen after 5 minutes
listener {
    timeout = 300                                          # 5 min
    on-timeout = brightnessctl -s set 10%                  # save current brightness and dim to 10%
    on-resume = brightnessctl -r                           # restore previous brightness
}

# Lock screen after 10 minutes
listener {
    timeout = 600                                          # 10 min
    on-timeout = loginctl lock-session                     # lock screen
}

# Turn off screen after 10.5 minutes (shortly after lock)
listener {
    timeout = 630                                          # 10.5 min
    on-timeout = hyprctl dispatch dpms off                 # screen off
    on-resume = hyprctl dispatch dpms on                   # screen on when activity detected
}

